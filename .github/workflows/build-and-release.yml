name: Build and Release aws-efs-utils

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  TAG: ${{ vars.TAG }}

jobs:
  build-amd64:
    env:
      ARCH: amd64
      PKG: ${{ matrix.pkg }}
    name: Build ${{ matrix.pkg }} for amd64
    strategy:
      fail-fast: false
      matrix:
        arch: [ amd64 ]
        pkg: [ deb, rpm ]
    runs-on: ubuntu-24.04
    steps: &build-steps
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: aws/efs-utils.git
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build package in container
        run: |
          set -e
  
          VERSION="${TAG#v}"
  
          echo "Building $PKG for $ARCH, version $VERSION"
  
          case "$ARCH" in
            amd64)
              DEB_ARCH=amd64
              RPM_ARCH=x86_64
              ;;
            arm64)
              DEB_ARCH=arm64
              RPM_ARCH=aarch64
              ;;
            *)
              echo "Unknown arch $ARCH"
              exit 1
              ;;
          esac
  
          if [ "$PKG" = "deb" ]; then
            BASE_IMAGE="ubuntu:22.04"
          else
            BASE_IMAGE="amazonlinux:2"
          fi
  
          docker run --rm \
            --platform="linux/$ARCH" \
            -v "$PWD":/src \
            -w /src \
            -e "PKG=${PKG}" \
            "$BASE_IMAGE" \
            /bin/bash -c '
              set -e
  
              if [ "$PKG" = "deb" ]; then
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get -y install \
                  git \
                  golang \
                  binutils \
                  rustc \
                  cargo \
                  libssl-dev \
                  pkg-config \
                  gettext \
                  make \
                  gcc \
                  g++ \
                  cmake \
                  wget \
                  perl
  
                # We already have the repo checked out at /src, so no git clone here.
                if [ ! -x "./build-deb.sh" ]; then
                  echo "build-deb.sh not found; adjust path if needed"
                  ls
                  exit 1
                fi
  
                ./build-deb.sh
  
              else
                yum -y install \
                  git \
                  golang \
                  rpm-build \
                  make \
                  rust \
                  cargo \
                  openssl-devel \
                  gcc \
                  gcc-c++ \
                  cmake3 \
                  wget \
                  perl
  
                make rpm
              fi
            '
  
          mkdir -p dist
  
          if [ "$PKG" = "deb" ]; then
            cp build/amazon-efs-utils*deb dist/
          else
            cp build/rpmbuild/RPMS/*/*rpm dist/
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-efs-utils-${{ matrix.pkg }}-${{ matrix.arch }}
          path: dist/*

  build-arm64:
    env:
      ARCH: arm64
      PKG: ${{ matrix.pkg }}
    name: Build ${{ matrix.pkg }} for arm64
    strategy:
      fail-fast: false
      matrix:
        arch: [ arm64 ]
        pkg: [ deb, rpm ]
    runs-on: ubuntu-24.04-arm
    steps: *build-steps

  release:
    name: Create GitHub Release and upload packages
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: List artifacts
        run: ls -R ./dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          draft: false
          prerelease: false
          files: |
            dist/**/*.deb
            dist/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}